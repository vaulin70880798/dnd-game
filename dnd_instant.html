<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>שליט המבוך AI</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Assistant:wght@400;600;700&display=swap");

      :root {
        --bg: #0a0a0a;
        --surface: #1c1c1e;
        --surface-deep: #121214;
        --accent: #ff9f0a;
        --accent-soft: #ffd877;
        --text: #f7f7f7;
        --muted: rgba(255, 255, 255, 0.72);
        --line: rgba(255, 159, 10, 0.5);
        --line-soft: rgba(255, 159, 10, 0.3);
        --shadow-accent: 0 0 18px rgba(255, 159, 10, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        direction: rtl;
        font-family: "Assistant", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 13% 9%, rgba(255, 159, 10, 0.13), transparent 35%),
          radial-gradient(circle at 83% 14%, rgba(71, 93, 119, 0.2), transparent 39%),
          radial-gradient(circle at 68% 84%, rgba(44, 56, 74, 0.18), transparent 36%),
          var(--bg);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.008) 0px,
            rgba(255, 255, 255, 0.008) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.006) 0px,
            rgba(255, 255, 255, 0.006) 1px,
            transparent 1px,
            transparent 3px
          );
      }

      .viewport {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .phone {
        width: min(430px, 95vw);
        height: min(890px, 95dvh);
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.62);
        box-shadow: 0 24px 74px rgba(0, 0, 0, 0.62);
        overflow: hidden;
        position: relative;
        backdrop-filter: blur(12px);
      }

      .screen-stack {
        position: absolute;
        inset: 0;
      }

      .screen {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        overflow-y: auto;
        padding: 18px 14px 96px;
        transform: translateY(8px);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .screen.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .title-xl {
        margin: 0 0 10px;
        font-size: clamp(27px, 6vw, 36px);
        line-height: 1.05;
      }

      .title-lg {
        margin: 0;
        font-size: clamp(22px, 5vw, 28px);
      }

      .muted {
        color: var(--muted);
      }

      .card {
        background: linear-gradient(154deg, rgba(28, 28, 30, 0.96), rgba(13, 13, 15, 0.96));
        border: 0.5px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow-accent);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 8px;
        border: 0.5px solid rgba(255, 159, 10, 0.15);
        border-radius: 11px;
        pointer-events: none;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        font: inherit;
        cursor: pointer;
        transition:
          transform 150ms ease,
          opacity 150ms ease;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: linear-gradient(130deg, var(--accent-soft), var(--accent));
        color: #1d1408;
        font-size: 14px;
        font-weight: 700;
        padding: 9px 12px;
        box-shadow: 0 0 14px rgba(255, 159, 10, 0.35);
      }

      .btn-soft {
        background: rgba(255, 255, 255, 0.04);
        border: 0.5px solid var(--line-soft);
        color: var(--text);
        font-size: 13px;
        padding: 7px 10px;
      }

      .campaign-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .campaign-card {
        padding: 8px;
      }

      .media {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        border: 0.5px solid var(--line-soft);
        background:
          linear-gradient(162deg, rgba(52, 64, 81, 0.84), rgba(13, 15, 19, 0.96)),
          linear-gradient(34deg, rgba(255, 159, 10, 0.14), transparent 60%);
        position: relative;
      }

      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .media-cover {
        aspect-ratio: 3 / 4;
      }

      .media-wide {
        aspect-ratio: 16 / 9;
      }

      .media-square {
        aspect-ratio: 1 / 1;
      }

      .campaign-card h3 {
        margin: 8px 0 3px;
        font-size: 15px;
        line-height: 1.25;
      }

      .campaign-card p {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .tab-bar {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        background: rgba(14, 14, 16, 0.96);
        border: 0.5px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 6px 5px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        z-index: 30;
      }

      .tab-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        display: grid;
        justify-items: center;
        gap: 3px;
        border-radius: 10px;
        padding: 5px 0;
        font-size: 11px;
        cursor: pointer;
      }

      .tab-btn.active {
        color: var(--accent);
        background: rgba(255, 159, 10, 0.08);
        text-shadow: 0 0 10px rgba(255, 159, 10, 0.74);
      }

      .icon-sprite {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-image: url("./master-icon-bank-hebrew-ui.png");
        background-size: 1024px 576px;
        background-repeat: no-repeat;
      }

      .icon-sprite.fallback svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
      }

      .list {
        display: grid;
        gap: 9px;
      }

      .list-row {
        display: grid;
        grid-template-columns: 72px 1fr auto;
        gap: 9px;
        align-items: center;
        padding: 8px;
      }

      .list-row h3 {
        margin: 0 0 3px;
        font-size: 15px;
      }

      .list-row p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .field {
        width: 100%;
        color: var(--text);
        background: rgba(8, 9, 11, 0.86);
        border: 0.5px solid var(--line-soft);
        border-radius: 11px;
        font: inherit;
        padding: 10px 12px;
        direction: rtl;
        text-align: right;
      }

      .field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.15);
      }

      .settings-card {
        padding: 11px;
        margin-bottom: 10px;
      }

      .toggle {
        border: 0.5px solid var(--line-soft);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .toggle h4 {
        margin: 0;
        font-size: 14px;
      }

      .toggle p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .switch {
        width: 44px;
        height: 26px;
        border-radius: 999px;
        border: 0.5px solid var(--line);
        background: rgba(255, 255, 255, 0.07);
        position: relative;
      }

      .switch::after {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 2px;
        right: 2px;
        transition: transform 170ms ease;
      }

      .switch.active {
        background: rgba(255, 159, 10, 0.33);
      }

      .switch.active::after {
        transform: translateX(-18px);
      }

      .lock-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.66);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 40;
        padding: 12px;
      }

      .lock-overlay.active {
        display: flex;
      }

      .lock-card {
        width: 100%;
        max-width: 338px;
        padding: 14px;
      }

      .lock-card h3 {
        margin: 0 0 8px;
        font-size: 21px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .lock-card p {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .overlay-page {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 60;
        display: none;
      }

      .overlay-page.active {
        display: grid;
      }

      .landing {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .landing-header {
        height: 255px;
        position: relative;
      }

      .landing-header::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.83) 84%, var(--bg));
      }

      .landing-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .landing-toolbar {
        position: absolute;
        top: 11px;
        right: 10px;
        left: 10px;
        z-index: 3;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .landing-title {
        position: absolute;
        z-index: 3;
        right: 14px;
        left: 14px;
        bottom: 14px;
      }

      .landing-title h2 {
        margin: 0;
        font-size: 29px;
      }

      .landing-title p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .landing-body {
        overflow-y: auto;
        padding: 12px;
      }

      .section {
        margin-bottom: 10px;
      }

      .section h3 {
        margin: 0 0 7px;
        font-size: 18px;
      }

      .section p {
        margin: 0;
        font-size: 14px;
        line-height: 1.46;
        color: rgba(255, 255, 255, 0.92);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .hero-card {
        border: 0.5px solid var(--line-soft);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        padding: 7px;
        cursor: pointer;
      }

      .hero-card.active {
        border-color: var(--accent);
        box-shadow: 0 0 13px rgba(255, 159, 10, 0.28);
      }

      .hero-card h4 {
        margin: 6px 0 2px;
        font-size: 14px;
      }

      .hero-card p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .hero-note {
        margin-top: 8px;
        border: 0.5px solid var(--line);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.04);
        padding: 8px 10px;
      }

      .hero-note h4 {
        margin: 0 0 5px;
        font-size: 13px;
        color: var(--accent-soft);
      }

      .hero-note p {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
      }

      .hero-note .secret {
        margin-top: 7px;
        color: #f3cb92;
      }

      .landing-footer {
        padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0px));
        border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 10, 12, 0.96);
      }

      .gameplay {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .gp-top {
        padding: 10px 11px 8px;
        background: rgba(10, 10, 12, 0.95);
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
      }

      .gp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .gp-header h3 {
        margin: 0;
        font-size: 15px;
      }

      .segment {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        border: 0.5px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
      }

      .segment button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .segment button.active {
        background: linear-gradient(130deg, var(--accent-soft), var(--accent));
        color: #1d1408;
        font-weight: 700;
      }

      .gp-body {
        overflow-y: auto;
      }

      .parallax {
        height: 220px;
        position: relative;
        overflow: hidden;
      }

      .parallax img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translateY(0);
        transition: transform 44ms linear;
      }

      .parallax::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.83) 84%, var(--bg));
      }

      .chat-log {
        direction: ltr;
        display: grid;
        gap: 8px;
        padding: 10px 10px 12px;
      }

      .msg {
        max-width: 90%;
        border: 0.5px solid rgba(255, 159, 10, 0.42);
        border-radius: 12px;
        background: rgba(18, 18, 20, 0.68);
        padding: 8px 10px;
        white-space: pre-wrap;
        direction: rtl;
        text-align: right;
        animation: msgIn 190ms ease;
      }

      .msg.assistant {
        justify-self: start;
        font-family: "New York", Georgia, serif;
        font-size: 15px;
        line-height: 1.45;
      }

      .msg.user {
        justify-self: end;
        font-size: 16px;
        font-weight: 700;
      }

      .msg.system {
        justify-self: center;
        font-size: 12px;
        color: var(--muted);
      }

      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(7px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gp-settings {
        padding: 12px;
      }

      .slider-row {
        margin-bottom: 9px;
      }

      .slider-row label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 4px;
      }

      .slider-row input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .gp-compose {
        border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 10, 12, 0.96);
        padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }

      .note {
        margin: 0 0 6px;
        font-size: 12px;
        color: #f7cb88;
      }

      .compose-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .compose-wrap {
        position: relative;
      }

      .compose-input {
        width: 100%;
        color: var(--text);
        background: rgba(20, 20, 22, 0.96);
        border: 0.5px solid var(--line);
        border-radius: 12px;
        font-size: 14px;
        padding: 10px 78px 10px 12px;
        direction: rtl;
        text-align: right;
      }

      .compose-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.14);
      }

      .inline-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        border: 0;
        background: transparent;
        color: var(--accent);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .inline-wand {
        right: 6px;
      }

      .inline-send {
        right: 38px;
      }

      .dice-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        border: 0.5px solid var(--line);
        background: rgba(255, 159, 10, 0.12);
        color: var(--accent);
        box-shadow: 0 0 10px rgba(255, 159, 10, 0.33);
      }

      .toast {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translate(-50%, -12px);
        opacity: 0;
        padding: 9px 12px;
        border-radius: 999px;
        border: 0.5px solid var(--line);
        background: rgba(20, 20, 23, 0.95);
        box-shadow: 0 0 12px rgba(255, 159, 10, 0.24);
        pointer-events: none;
        transition:
          opacity 170ms ease,
          transform 170ms ease;
        z-index: 120;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .splash {
        position: absolute;
        inset: 0;
        z-index: 90;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, rgba(255, 159, 10, 0.15), transparent 34%),
          #000;
        transition: opacity 450ms ease;
      }

      .splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      .splash-inner {
        text-align: center;
      }

      .logo {
        width: 176px;
        height: 176px;
        margin: 0 auto 14px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle, rgba(255, 214, 115, 0.24), rgba(255, 159, 10, 0.02));
        box-shadow: 0 0 30px rgba(255, 159, 10, 0.26);
        animation: pulse 1.24s ease-in-out infinite;
        cursor: grab;
        user-select: none;
        touch-action: none;
        will-change: transform;
        transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0);
      }

      .logo.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .logo .icon-sprite {
        width: 132px;
        height: 132px;
      }

      .logo-title {
        margin: 0;
        font-size: clamp(34px, 8vw, 50px);
        letter-spacing: 0.03em;
        font-family: "Cinzel", "New York", Georgia, serif;
        text-shadow: 0 0 16px rgba(255, 159, 10, 0.24);
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(0.95);
          opacity: 0.86;
        }
        50% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(1.02);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <div class="phone">
        <div class="screen-stack">
          <section id="screen-home" class="screen"></section>
          <section id="screen-library" class="screen"></section>
          <section id="screen-campaigns" class="screen"></section>
          <section id="screen-settings" class="screen"></section>
        </div>

        <nav id="tabBar" class="tab-bar"></nav>
        <div id="lockOverlay" class="lock-overlay"></div>

        <div id="splash" class="splash">
          <div class="splash-inner">
            <div id="splashLogo" class="logo"></div>
            <h1 class="logo-title">שליט המבוך AI</h1>
          </div>
        </div>
      </div>
    </div>

    <div id="campaignDetail" class="overlay-page"></div>
    <div id="gameplay" class="overlay-page"></div>
    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEY = "dmai_premium_reset_v1";
      const VERSION = 1;

      const ICON_MAP = {
        dragon: { off: [-24, -72], on: [-24, -72], size: 132 },
        home: { off: [-572, -78], on: [-572, -136], size: 22 },
        library: { off: [-630, -78], on: [-630, -136], size: 22 },
        campaigns: { off: [-744, -78], on: [-744, -136], size: 22 },
        settings: { off: [-806, -78], on: [-806, -136], size: 22 },
        back: { off: [-574, -194], on: [-574, -252], size: 20 },
        wand: { off: [-630, -194], on: [-630, -252], size: 19 },
        send: { off: [-803, -194], on: [-803, -252], size: 19 },
        dice: { off: [-575, -311], on: [-633, -311], size: 24 },
        lock: { off: [-860, -311], on: [-860, -311], size: 22 },
      };

      const ICON_FALLBACK = {
        home: `<svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>`,

        toast.timer = setTimeout(() => node.classList.remove("show"), 2300);
      }

      function mask(value) {
        if (!value || value.length < 8) return "";
        return `${value.slice(0, 4)}••••••${value.slice(-4)}`;
      }

      function esc(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function attr(text) {
        return esc(text).replaceAll('"', "&quot;");
      }

      function sprite(name, active = false, customSize = null) {
        const info = ICON_MAP[name];

          return `<span class="icon-sprite" style="width:${size}px;height:${size}px;background-position:${x}px ${y}px;${active ? "filter:drop-shadow(0 0 8px rgba(255,159,10,.72));" : ""}"></span>`;
        }
        return `<span class="icon-sprite fallback" style="width:${size}px;height:${size}px">${ICON_FALLBACK[name] || ""}</span>`;
      }

        const finalURL = state.settings.freeImageMode ? (url || toImageURL(fallbackPrompt, seed, w, h)) : "";

      function localReply(campaign, hero, input) {
        const pool = [
          "המסדרון נסגר מאחוריך, וקול מתכתי לוחש את שמך מתוך החשכה.",
          "להבות דקות רצות לאורך הקיר, כאילו הממלכה עצמה מקשיבה לבחירתך.",
          "מעבר צדדי נפתח היכן שלא אמור להיות מעבר, בדיוק בכיוון שהגיבור שלך מכיר.",
          "רגע של דממה, ואז הצעד הבא של העולם מתיישר עם הסוד שאתה נושא.",
        ];
        const picked = pool[Math.floor(Math.random() * pool.length)];
        return `${picked}\n\n(${campaign.genre} • פרספקטיבה: ${hero.name})`;

      async function callOpenAI(messages, maxTokens) {
        const payload = {
          model: "gpt-4o-mini",
          temperature: state.engine.temperature,
          top_p: state.engine.topP,
          max_tokens: Math.max(60, maxTokens),
          messages,
        };
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${state.settings.apiKey}`,
          },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error("openai");
        const data = await response.json();
        const text = data?.choices?.[0]?.message?.content || "";
        if (!text.trim()) throw new Error("empty");
        return text.trim();
      }

      async function sendAction(text) {
        const campaign = state.campaigns.find((c) => c.id === state.activeCampaignId);
        const hero = campaign?.heroes.find((h) => h.id === state.activeHeroId);
        if (!campaign || !hero) return;
        const clean = text.trim();
        if (!clean) return;
        if (!isUnlocked()) {
          toast("נדרש מפתח OpenAI או מצב דמו.");
          return;
        }

        campaign.messages.push({ id: uid(), role: "user", text: clean, ts: Date.now() });
        state.loadingAI = true;
        state.gameplayInput = "";
        renderGameplay();

        let answer = "";
        try {
          if (canCallOpenAI()) {
            const context = campaign.messages.slice(-14).map((m) => ({
              role: m.role === "assistant" ? "assistant" : "user",
              content: m.text,
            }));
            const system = `אתה שליט המבוך AI. כתוב בעברית בלבד בטון ${campaign.genre}. הגיבור: ${hero.name} (${hero.className}). רקע: ${hero.background}. סוד נסתר של הגיבור: ${hero.secret}. שמור על הטון האפל והקולנועי.`;
            answer = await callOpenAI([{ role: "system", content: system }, ...context], Math.round(state.engine.maxChars / 4));
          } else {
            answer = localReply(campaign, hero, clean);
          }
        } catch {
          answer = localReply(campaign, hero, clean);
          toast("קריאת OpenAI נכשלה, הופעלה תגובת גיבוי.");
        }

        campaign.messages.push({ id: uid(), role: "assistant", text: answer, ts: Date.now() });
        state.loadingAI = false;
        renderGameplay();
      }

      async function suggestAction() {
        const campaign = state.campaigns.find((c) => c.id === state.activeCampaignId);
        const hero = campaign?.heroes.find((h) => h.id === state.activeHeroId);
        if (!campaign || !hero) return;
        if (!isUnlocked()) {
          toast("נדרש מפתח OpenAI או מצב דמו.");
          return;

        try {
          if (canCallOpenAI()) {
            const text = await callOpenAI(
              [
                { role: "system", content: "הצע פעולה אחת קצרה ומדויקת לשחקן בעברית בלבד." },
                { role: "user", content: `עולם: ${campaign.title}. גיבור: ${hero.name}.` },

              36
            );
            state.gameplayInput = text.replace(/\n+/g, " ").trim();
          } else {

              "אני מתקדם בשקט ובודק נתיב חלופי.",
              "אני יוזם שיחה במקום שליפה מיידית של נשק.",
              "אני מחפש רמז שמחובר לסוד של הדמות שלי.",
              "אני משתמש בידע המקצועי כדי לפתוח יתרון טקטי.",
            ];
            state.gameplayInput = suggestions[Math.floor(Math.random() * suggestions.length)];
          }

          state.gameplayInput = "אני בוחן את הסביבה ומחפש סימן שמכוון אותי קדימה.";

      function setupSplashDrag() {
        const logo = document.getElementById("splashLogo");
        let pointerId = null;
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let raf = 0;

        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const animate = () => {
          currentX += (targetX - currentX) * 0.2;
          currentY += (targetY - currentY) * 0.2;
          logo.style.setProperty("--drag-x", `${currentX.toFixed(2)}px`);
          logo.style.setProperty("--drag-y", `${currentY.toFixed(2)}px`);
          if (Math.abs(targetX - currentX) > 0.15 || Math.abs(targetY - currentY) > 0.15) {
            raf = requestAnimationFrame(animate);
          } else {
            raf = 0;
          }
        };
        const kick = () => {
          if (!raf) raf = requestAnimationFrame(animate);
        };

        const release = () => {
          pointerId = null;
          targetX = 0;
          targetY = 0;
          logo.classList.remove("dragging");
          kick();
        };

        logo.addEventListener("pointerdown", (e) => {
          pointerId = e.pointerId;
          logo.classList.add("dragging");
          logo.setPointerCapture(e.pointerId);
        });

        logo.addEventListener("pointermove", (e) => {
          if (pointerId !== e.pointerId) return;
          const rect = logo.getBoundingClientRect();
          const dx = e.clientX - (rect.left + rect.width / 2);
          const dy = e.clientY - (rect.top + rect.height / 2);
          targetX = clamp(dx * 0.35, -24, 24);
          targetY = clamp(dy * 0.35, -18, 18);
          kick();
        });

        logo.addEventListener("pointerup", release);
        logo.addEventListener("pointercancel", release);
        logo.addEventListener("pointerleave", () => {
          if (pointerId !== null) release();
        });
      }

          document.getElementById(`screen-${key}`).classList.toggle("active", state.tab === key);
        });
        renderHome();

      document.addEventListener("click", async (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;

        if (action === "tab") {
          state.tab = target.dataset.tab;
          renderAll();
          return;
        }
        if (action === "open-campaign") {
          openCampaign(target.dataset.id);
          return;
        }
        if (action === "close-detail") {
          state.detailCampaignId = null;
          state.detailHeroId = null;
          renderCampaignDetail();
          return;
        }
        if (action === "pick-hero") {
          state.detailHeroId = target.dataset.hero;
          renderCampaignDetail();
          return;
        }
        if (action === "begin-adventure") {
          beginAdventure();
          return;
        }
        if (action === "close-game") {
          state.activeCampaignId = null;
          state.activeHeroId = null;
          state.loadingAI = false;
          renderGameplay();
          persist();
          return;
        }
        if (action === "segment") {
          state.gameplaySegment = target.dataset.segment;
          renderGameplay();
          persist();
          return;
        }
        if (action === "send") {
          const input = document.getElementById("composeInput");
          await sendAction(input?.value || "");
          return;
        }
        if (action === "roll") {
          const roll = Math.floor(Math.random() * 20) + 1;
          await sendAction(`תוצאת גלגול (D20): ${roll}`);
          return;
        }
        if (action === "suggest") {
          await suggestAction();
          return;
        }
        if (action === "go-settings") {
          state.tab = "settings";
          renderAll();
          return;
        }
        if (action === "save-api") {
          const input = document.getElementById("apiKeyInput");
          state.settings.apiKey = (input?.value || "").trim();
          renderSettings();
          renderLock();
          persist();
          toast(state.settings.apiKey ? "המפתח נשמר." : "לא הוזן מפתח.");
          return;
        }
        if (action === "clear-api") {
          state.settings.apiKey = "";
          renderSettings();
          renderLock();
          persist();
          toast("המפתח נמחק.");
          return;
        }
        if (action === "toggle-demo") {
          state.settings.demoMode = !state.settings.demoMode;
          renderSettings();
          renderLock();
          persist();
          toast(state.settings.demoMode ? "מצב דמו הופעל." : "מצב דמו כובה.");
          return;
        }
        if (action === "toggle-images") {
          state.settings.freeImageMode = !state.settings.freeImageMode;
          renderAll();
          toast(state.settings.freeImageMode ? "תמונות AI הופעלו." : "תמונות AI כובו.");
          return;
        }
        if (action === "apply-engine") {
          toast("הגדרות מנוע הוחלו.");
          return;
        }
        if (action === "reset-engine") {
          state.engine = { temperature: 0.7, maxChars: 260, topP: 0.9, topK: 40 };
          renderGameplay();
          persist();
          toast("הגדרות אופסו.");
          return;
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "composeInput") {
          state.gameplayInput = event.target.value;

      document.addEventListener("change", (event) => {

        persist();
      });

      document.addEventListener("keydown", async (event) => {
        if (event.key === "Escape") {
          if (state.activeCampaignId) {
            state.activeCampaignId = null;
            state.activeHeroId = null;
            renderGameplay();
            persist();
            return;
          }
          if (state.detailCampaignId) {
            state.detailCampaignId = null;
            state.detailHeroId = null;
            renderCampaignDetail();
          }
        }
        if (event.key === "Enter" && !event.shiftKey && event.target?.id === "composeInput") {
          event.preventDefault();
          await sendAction(event.target.value || "");
        }
      });

      function init() {
        preloadIconBank();
        previewMode();
        renderAll();
        setupSplashDrag();
        splashTimer();
      }

      init();
    </script>
  </body>
</html>
