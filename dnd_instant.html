<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>שליט המבוך AI</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Assistant:wght@400;600;700&display=swap");

      :root {
        --bg: #0a0a0a;
        --surface: #1c1c1e;
        --surface-2: #161618;
        --glass: rgba(255, 255, 255, 0.05);
        --text: #f8f8f8;
        --muted: rgba(255, 255, 255, 0.7);
        --accent: #ff9f0a;
        --accent-soft: #ffd877;
        --line: rgba(255, 159, 10, 0.5);
        --line-soft: rgba(255, 159, 10, 0.3);
        --shadow: 0 0 18px rgba(255, 159, 10, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        direction: rtl;
        font-family: "Assistant", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 159, 10, 0.13), transparent 36%),
          radial-gradient(circle at 84% 13%, rgba(74, 96, 123, 0.2), transparent 38%),
          radial-gradient(circle at 70% 85%, rgba(42, 55, 73, 0.2), transparent 36%),
          var(--bg);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.008) 0px,
            rgba(255, 255, 255, 0.008) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.006) 0px,
            rgba(255, 255, 255, 0.006) 1px,
            transparent 1px,
            transparent 3px
          );
      }

      .viewport {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .phone {
        width: min(430px, 95vw);
        height: min(890px, 95dvh);
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.62);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.62);
        overflow: hidden;
        position: relative;
        backdrop-filter: blur(12px);
      }

      .screen-stack {
        position: absolute;
        inset: 0;
      }

      .screen {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        overflow-y: auto;
        padding: 18px 14px 98px;
        transform: translateY(10px);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .screen.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .title-xl {
        margin: 0 0 12px;
        font-size: clamp(27px, 6vw, 36px);
        line-height: 1.05;
        letter-spacing: -0.01em;
      }

      .title-lg {
        margin: 0;
        font-size: clamp(22px, 5vw, 28px);
      }

      .muted {
        color: var(--muted);
      }

      .card {
        background: linear-gradient(156deg, rgba(28, 28, 30, 0.96), rgba(14, 14, 15, 0.95));
        border: 0.5px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 8px;
        border: 0.5px solid rgba(255, 159, 10, 0.15);
        border-radius: 11px;
        pointer-events: none;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font: inherit;
        transition:
          transform 160ms ease,
          opacity 160ms ease;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: linear-gradient(130deg, var(--accent-soft), var(--accent));
        color: #1d1408;
        font-weight: 700;
        font-size: 14px;
        padding: 9px 12px;
        box-shadow: 0 0 14px rgba(255, 159, 10, 0.36);
      }

      .btn-soft {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border: 0.5px solid var(--line-soft);
        font-size: 13px;
        padding: 7px 10px;
      }

      .campaign-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .campaign-card {
        padding: 8px;
      }

      .campaign-cover {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 12px;
        border: 0.5px solid var(--line-soft);
        display: block;
        background:
          linear-gradient(160deg, rgba(46, 58, 74, 0.82), rgba(13, 15, 19, 0.95)),
          linear-gradient(40deg, rgba(255, 159, 10, 0.15), transparent 60%);
      }

      .campaign-card h3 {
        margin: 8px 0 3px;
        font-size: 16px;
        line-height: 1.25;
      }

      .campaign-card p {
        margin: 0 0 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 9px;
      }

      .list-row {
        display: grid;
        grid-template-columns: 70px 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 8px;
      }

      .thumb-16-9 {
        width: 70px;
        height: 52px;
        border-radius: 10px;
        object-fit: cover;
        display: block;
        border: 0.5px solid var(--line-soft);
        background:
          linear-gradient(156deg, rgba(45, 57, 73, 0.8), rgba(14, 17, 21, 0.95)),
          linear-gradient(30deg, rgba(255, 159, 10, 0.14), transparent 60%);
      }

      .field {
        width: 100%;
        color: var(--text);
        background: rgba(8, 9, 11, 0.86);
        border: 0.5px solid var(--line-soft);
        border-radius: 11px;
        font: inherit;
        direction: rtl;
        text-align: right;
        padding: 10px 12px;
      }

      .field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.15);
      }

      .settings-card {
        padding: 11px;
        margin-bottom: 10px;
      }

      .toggle {
        border: 0.5px solid var(--line-soft);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .toggle h4 {
        margin: 0;
        font-size: 14px;
      }

      .toggle p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .switch {
        width: 44px;
        height: 26px;
        border-radius: 999px;
        border: 0.5px solid var(--line);
        background: rgba(255, 255, 255, 0.07);
        position: relative;
      }

      .switch::after {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 2px;
        right: 2px;
        transition: transform 170ms ease;
      }

      .switch.active {
        background: rgba(255, 159, 10, 0.33);
      }

      .switch.active::after {
        transform: translateX(-18px);
      }

      .tab-bar {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        background: rgba(14, 14, 16, 0.96);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 6px 5px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        z-index: 30;
      }

      .tab-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        display: grid;
        justify-items: center;
        gap: 3px;
        border-radius: 10px;
        padding: 5px 0;
        font-size: 11px;
        cursor: pointer;
      }

      .tab-btn.active {
        color: var(--accent);
        background: rgba(255, 159, 10, 0.08);
        text-shadow: 0 0 10px rgba(255, 159, 10, 0.7);
      }

      .icon-sprite {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-image: url("./master-icon-bank-hebrew-ui.png");
        background-size: 1024px 576px;
        background-repeat: no-repeat;
      }

      .icon-sprite.fallback svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
      }

      .overlay-page {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 60;
        display: none;
      }

      .overlay-page.active {
        display: grid;
      }

      /* Campaign Landing Page */
      .landing {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .landing-top {
        position: relative;
        height: 255px;
      }

      .landing-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .landing-top::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.17), rgba(0, 0, 0, 0.82) 86%, var(--bg));
      }

      .landing-toolbar {
        position: absolute;
        top: 12px;
        right: 10px;
        left: 10px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .landing-meta {
        position: absolute;
        bottom: 14px;
        right: 14px;
        left: 14px;
        z-index: 3;
      }

      .landing-meta h2 {
        margin: 0;
        font-size: 30px;
      }

      .landing-meta p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .landing-body {
        overflow-y: auto;
        padding: 12px 12px 20px;
      }

      .section {
        margin-bottom: 11px;
      }

      .section h3 {
        margin: 0 0 7px;
        font-size: 19px;
      }

      .section p {
        margin: 0 0 8px;
        font-size: 14px;
        line-height: 1.48;
        color: rgba(255, 255, 255, 0.9);
      }

      .acts {
        display: grid;
        gap: 6px;
      }

      .act {
        border: 0.5px solid var(--line-soft);
        border-radius: 12px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.03);
      }

      .act h4 {
        margin: 0 0 5px;
        color: var(--accent-soft);
        font-size: 13px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .hero-card {
        border: 0.5px solid var(--line-soft);
        border-radius: 13px;
        padding: 7px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
      }

      .hero-card.active {
        border-color: var(--accent);
        box-shadow: 0 0 14px rgba(255, 159, 10, 0.28);
      }

      .hero-portrait {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 10px;
        border: 0.5px solid rgba(255, 159, 10, 0.25);
        object-fit: cover;
        display: block;
      }

      .hero-card h4 {
        margin: 6px 0 2px;
        font-size: 14px;
      }

      .hero-card p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .start-scene {
        margin-top: 9px;
        border: 0.5px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        padding: 9px 10px;
      }

      .start-scene h4 {
        margin: 0 0 6px;
        font-size: 13px;
        color: var(--accent-soft);
      }

      .start-scene p {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
      }

      .start-scene .secret {
        margin-top: 7px;
        color: #f5c98f;
      }

      /* Gameplay */
      .gameplay {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .gp-top {
        padding: 10px 11px 8px;
        background: rgba(10, 10, 12, 0.95);
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
      }

      .gp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .gp-header h3 {
        margin: 0;
        font-size: 15px;
      }

      .segment {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        border: 0.5px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
      }

      .segment button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .segment button.active {
        background: linear-gradient(130deg, var(--accent-soft), var(--accent));
        color: #1c1408;
        font-weight: 700;
      }

      .gp-body {
        overflow-y: auto;
      }

      .parallax {
        height: 220px;
        position: relative;
        overflow: hidden;
      }

      .parallax img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translateY(0);
        transition: transform 45ms linear;
      }

      .parallax::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.82) 85%, var(--bg));
      }

      .chat-log {
        direction: ltr;
        display: grid;
        gap: 8px;
        padding: 10px 10px 12px;
      }

      .msg {
        max-width: 90%;
        border: 0.5px solid rgba(255, 159, 10, 0.42);
        background: rgba(18, 18, 20, 0.68);
        border-radius: 12px;
        padding: 8px 10px;
        white-space: pre-wrap;
        animation: msgIn 190ms ease;
        direction: rtl;
        text-align: right;
      }

      .msg.assistant {
        justify-self: start;
        font-family: "New York", Georgia, serif;
        font-size: 15px;
        line-height: 1.45;
      }

      .msg.user {
        justify-self: end;
        font-size: 16px;
        font-weight: 700;
      }

      .msg.system {
        justify-self: center;
        font-size: 12px;
        color: var(--muted);
      }

      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(7px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gp-settings {
        padding: 12px;
      }

      .slider-row {
        margin-bottom: 10px;
      }

      .slider-row label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        margin-bottom: 5px;
      }

      .slider-row input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .gp-compose {
        border-top: 0.5px solid rgba(255, 255, 255, 0.11);
        background: rgba(10, 10, 12, 0.96);
        padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }

      .compose-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .compose-input-wrap {
        position: relative;
      }

      .compose-input {
        width: 100%;
        border-radius: 12px;
        border: 0.5px solid var(--line);
        background: rgba(20, 20, 22, 0.95);
        color: var(--text);
        padding: 10px 78px 10px 12px;
        font-size: 14px;
        direction: rtl;
        text-align: right;
      }

      .compose-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.14);
      }

      .compose-inline-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        border: 0;
        background: transparent;
        color: var(--accent);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .compose-wand {
        right: 6px;
      }

      .compose-send {
        right: 38px;
      }

      .dice-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        border: 0.5px solid var(--line);
        background: rgba(255, 159, 10, 0.12);
        color: var(--accent);
        box-shadow: 0 0 10px rgba(255, 159, 10, 0.33);
      }

      .note {
        margin: 0 0 7px;
        font-size: 12px;
        color: #f7cb88;
      }

      .lock-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.66);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 40;
        padding: 12px;
      }

      .lock-overlay.active {
        display: flex;
      }

      .lock-card {
        width: 100%;
        max-width: 340px;
        padding: 14px;
      }

      .lock-card h3 {
        margin: 0 0 8px;
        font-size: 22px;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .lock-card p {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .toast {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translate(-50%, -12px);
        opacity: 0;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(20, 20, 23, 0.95);
        border: 0.5px solid var(--line);
        box-shadow: 0 0 13px rgba(255, 159, 10, 0.25);
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        z-index: 120;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .splash {
        position: absolute;
        inset: 0;
        z-index: 90;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, rgba(255, 159, 10, 0.14), transparent 34%),
          linear-gradient(160deg, #0b0d12, #060606 60%, #090a0f);
        transition: opacity 460ms ease;
      }

      .splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      .splash-inner {
        text-align: center;
      }

      .logo-emblem {
        width: 176px;
        height: 176px;
        border-radius: 50%;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        background: radial-gradient(circle, rgba(255, 214, 115, 0.22), rgba(255, 159, 10, 0.03));
        box-shadow: 0 0 28px rgba(255, 159, 10, 0.25);
        animation: splashPulse 1.25s ease-in-out infinite;
        cursor: grab;
        user-select: none;
        touch-action: none;
        will-change: transform;
        transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0);
      }

      .logo-emblem.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .logo-emblem .icon-sprite {
        width: 130px;
        height: 130px;
      }

      .logo-fallback {
        color: var(--accent);
      }

      .splash-title {
        margin: 0;
        font-size: clamp(35px, 8vw, 50px);
        letter-spacing: 0.03em;
        font-family: "Cinzel", "New York", Georgia, serif;
        text-shadow: 0 0 16px rgba(255, 159, 10, 0.24);
      }

      @keyframes splashPulse {
        0%,
        100% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(0.95);
          opacity: 0.86;
        }
        50% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(1.02);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <div class="phone">
        <div class="screen-stack">
          <section id="screen-home" class="screen"></section>
          <section id="screen-library" class="screen"></section>
          <section id="screen-campaigns" class="screen"></section>
          <section id="screen-settings" class="screen"></section>
        </div>
        <nav id="tabBar" class="tab-bar"></nav>
        <div id="lockOverlay" class="lock-overlay"></div>
        <div id="splash" class="splash">
          <div class="splash-inner">
            <div id="logoEmblem" class="logo-emblem"></div>
            <h1 class="splash-title">שליט המבוך AI</h1>
          </div>
        </div>
      </div>
    </div>

    <div id="campaignDetail" class="overlay-page"></div>
    <div id="gameplay" class="overlay-page"></div>
    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEY = "dmai_masterpiece_v4";
      const STATE_VERSION = 4;

      const ICON_SPRITES = {
        dragon: { on: [-24, -72], off: [-24, -72], size: 130 },
        home: { off: [-572, -78], on: [-572, -136], size: 22 },
        library: { off: [-630, -78], on: [-630, -136], size: 22 },
        campaigns: { off: [-744, -78], on: [-744, -136], size: 22 },
        settings: { off: [-806, -78], on: [-806, -136], size: 22 },
        back: { off: [-574, -194], on: [-574, -252], size: 20 },
        wand: { off: [-630, -194], on: [-630, -252], size: 19 },
        send: { off: [-803, -194], on: [-803, -252], size: 19 },
        dice: { off: [-575, -311], on: [-633, -311], size: 24 },
        lock: { off: [-860, -311], on: [-860, -311], size: 22 },
      };

      function hydrateCampaigns() {
        return CAMPAIGN_BLUEPRINTS.map((campaign) => ({
          ...campaign,
          coverUrl: imageUrl(campaign.coverPrompt, campaign.coverSeed, 1280, 720),
          messages: [],
          summary: campaign.hook[0],
          heroes: campaign.heroes.map((hero) => ({
            ...hero,
            portraitUrl: imageUrl(hero.portraitPrompt, hero.portraitSeed, 640, 640),
          })),
        }));

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

      function imageUrl(prompt, seed, width, height) {
        const encoded = encodeURIComponent(prompt);
        return `https://image.pollinations.ai/prompt/${encoded}?model=flux&width=${width}&height=${height}&nologo=true&seed=${seed}`;
      }

      function activeImage(url, fallbackPrompt, seed, width, height) {
        if (state.settings.freeImageMode) return url || imageUrl(fallbackPrompt, seed, width, height);
        return "";
      }

      function isUnlocked() {
        return Boolean(state.settings.apiKey) || state.settings.demoMode;
      }

      function canCallOpenAI() {
        return Boolean(state.settings.apiKey) && !state.settings.demoMode;
      }

      function toast(message) {
        const node = document.getElementById("toast");
        node.textContent = message;
        node.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => node.classList.remove("show"), 2400);
      }

      function escapeHTML(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeAttr(text) {
        return escapeHTML(text).replaceAll('"', "&quot;");
      }

      function iconMarkup(name, active = false, customSize = null) {
        const meta = ICON_SPRITES[name];
        const size = customSize || meta?.size || 22;
        if (iconBankReady && meta) {
          const pos = active ? meta.on : meta.off || meta.on;
          return `<span class="icon-sprite" style="width:${size}px;height:${size}px;background-position:${pos[0]}px ${pos[1]}px;${active ? "filter:drop-shadow(0 0 8px rgba(255,159,10,.68));" : ""}"></span>`;
        }
        const svg = FALLBACK_ICON_SVG[name] || "";
        return `<span class="icon-sprite fallback ${name === "dragon" ? "logo-fallback" : ""}" style="width:${size}px;height:${size}px">${svg}</span>`;
      }

      function openCampaign(id) {

      function startAdventure() {
        const campaign = state.campaigns.find((c) => c.id === state.detailCampaignId);
        const hero = campaign?.heroes.find((h) => h.id === state.detailSelectedHeroId);
        if (!campaign || !hero) {
          toast("בחר גיבור לפני התחלת ההרפתקה.");
          return;

          state.tab = "settings";
          renderAll();

          return;
        }

        if (!campaign.messages?.length) {
          campaign.messages = [
            { id: uid(), role: "assistant", text: hero.startingScene, ts: Date.now() },
            { id: uid(), role: "system", text: `סוד נסתר ל‑DM: ${hero.secret}`, ts: Date.now() },
          ];
        }

        state.activeCampaignId = campaign.id;
        state.activeHeroId = hero.id;
        state.gameplaySegment = "adventure";
        state.gameplayInput = "";
        state.detailCampaignId = null;
        state.detailSelectedHeroId = null;

      function localNarration(campaign, hero, input) {
        const lines = [
          "האוויר ננעל סביבך, ומעבר צר נפתח במקום שבו הקיר היה אטום לפני רגע.",
          "צליל מתכתי חד מודיע שמישהו כבר עקב אחריך הרבה לפני הבחירה הזו.",
          "העולם מגיב לשמך כאילו הוא זוכר אותך מחיים קודמים.",
          "מעליך, אורות דוהים בקצב לא טבעי — כאילו הזמן עצמו ממתין לפקודה שלך.",
        ];
        const picked = lines[Math.floor(Math.random() * lines.length)];
        return `${picked}\n\n(${campaign.theme} | פרספקטיבה: ${hero.name})`;
      }

      async function callOpenAI(messages, maxTokens) {
        const payload = {
          model: "gpt-4o-mini",
          temperature: state.engine.temperature,
          top_p: state.engine.topP,
          max_tokens: Math.max(60, maxTokens),
          messages,
        };
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${state.settings.apiKey}`,
          },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error("openai failed");
        const json = await response.json();
        const text = json?.choices?.[0]?.message?.content || "";
        if (!text.trim()) throw new Error("empty");
        return text.trim();
      }

      async function sendAction(text) {
        const campaign = state.campaigns.find((c) => c.id === state.activeCampaignId);
        const hero = campaign?.heroes.find((h) => h.id === state.activeHeroId);
        if (!campaign || !hero) return;
        const clean = text.trim();
        if (!clean) return;
        if (!isUnlocked()) {
          toast("נדרש מפתח OpenAI או מצב דמו.");
          return;
        }

        campaign.messages.push({ id: uid(), role: "user", text: clean, ts: Date.now() });
        state.gameplayInput = "";
        state.loadingAI = true;
        renderGameplay();

        let responseText = "";
        try {
          if (canCallOpenAI()) {
            const history = campaign.messages.slice(-14).map((m) => ({
              role: m.role === "assistant" ? "assistant" : "user",
              content: m.text,
            }));
            const system = `אתה שליט המבוך AI. כתוב בעברית בלבד בטון ${campaign.theme}. הגיבור הנבחר: ${hero.name}, ${hero.className}. סוד גיבור: ${hero.secret}. אל תחשוף את הסוד במפורש אלא אם השחקן מפעיל טריגר מתאים.`;
            responseText = await callOpenAI(
              [{ role: "system", content: system }, ...history],
              Math.round(state.engine.maxChars / 4)
            );
          } else {
            responseText = localNarration(campaign, hero, clean);
          }
        } catch {
          responseText = localNarration(campaign, hero, clean);
          toast("קריאת OpenAI נכשלה, הופעלה תגובת גיבוי.");
        }

        campaign.messages.push({ id: uid(), role: "assistant", text: responseText, ts: Date.now() });
        campaign.summary = responseText.slice(0, 180);
        state.loadingAI = false;
        renderGameplay();
      }

      async function suggestAction() {
        const campaign = state.campaigns.find((c) => c.id === state.activeCampaignId);
        const hero = campaign?.heroes.find((h) => h.id === state.activeHeroId);
        if (!campaign || !hero) return;
        if (!isUnlocked()) {
          toast("נדרש מפתח OpenAI או מצב דמו.");
          return;
        }
        try {
          if (canCallOpenAI()) {
            const suggestion = await callOpenAI(
              [
                { role: "system", content: "הצע פעולה אחת קצרה ומדויקת לשחקן, בעברית בלבד." },
                { role: "user", content: `עולם: ${campaign.title}. גיבור: ${hero.name}.` },
              ],
              40
            );
            state.gameplayInput = suggestion.replace(/\n+/g, " ").trim();
          } else {
            const local = [
              "אני בודק את הרצפה לאיתור סימני דם טריים.",
              "אני פותח משא ומתן במקום לשלוף נשק.",
              "אני מטיל לחש גילוי על מנגנון הדלת.",
              "אני עוקב אחרי מקור הצליל בלי להיחשף.",
            ];
            state.gameplayInput = local[Math.floor(Math.random() * local.length)];
          }
        } catch {
          state.gameplayInput = "אני סורק את האזור בשקט ומחפש יתרון.";
        }
        renderGameplay();
      }

      function uid() {
        return Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      function mask(value) {
        if (!value || value.length < 8) return "";
        return `${value.slice(0, 4)}••••••${value.slice(-4)}`;
      }

      function initLogoDrag() {
        const ring = document.getElementById("logoEmblem");
        let pointer = null;
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let raf = 0;

        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const animate = () => {
          currentX += (targetX - currentX) * 0.2;
          currentY += (targetY - currentY) * 0.2;
          ring.style.setProperty("--drag-x", `${currentX.toFixed(2)}px`);
          ring.style.setProperty("--drag-y", `${currentY.toFixed(2)}px`);
          if (Math.abs(targetX - currentX) > 0.15 || Math.abs(targetY - currentY) > 0.15) {
            raf = requestAnimationFrame(animate);
          } else {
            raf = 0;
          }
        };
        const go = () => {
          if (!raf) raf = requestAnimationFrame(animate);
        };

        const release = () => {
          pointer = null;
          targetX = 0;
          targetY = 0;
          ring.classList.remove("dragging");
          go();
        };

        ring.addEventListener("pointerdown", (event) => {
          pointer = event.pointerId;
          ring.classList.add("dragging");
          ring.setPointerCapture(event.pointerId);
        });

        ring.addEventListener("pointermove", (event) => {
          if (pointer !== event.pointerId) return;
          const rect = ring.getBoundingClientRect();
          const dx = event.clientX - (rect.left + rect.width / 2);
          const dy = event.clientY - (rect.top + rect.height / 2);
          targetX = clamp(dx * 0.35, -24, 24);
          targetY = clamp(dy * 0.35, -18, 18);
          go();
        });

        ring.addEventListener("pointerup", release);
        ring.addEventListener("pointercancel", release);
        ring.addEventListener("pointerleave", () => {
          if (pointer !== null) release();
        });
      }

      function handleURLPreviewModes() {
        const params = new URLSearchParams(location.search);
        const view = params.get("view");
        if (view === "landing") {
          state.detailCampaignId = state.campaigns[0]?.id || null;
          state.detailSelectedHeroId = state.campaigns[0]?.heroes?.[0]?.id || null;
        }
        if (view === "splash") {
          const splash = document.getElementById("splash");
          splash.classList.remove("hide");
          splash.dataset.persist = "true";
        }
      }

      function setupSplashTimer() {
        const splash = document.getElementById("splash");
        if (splash.dataset.persist === "true") return;
        setTimeout(() => splash.classList.add("hide"), 1700);
      }

      document.addEventListener("click", async (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;

        if (action === "set-tab") {
          state.tab = target.dataset.tab;
          renderAll();
          return;
        }

        if (action === "open-campaign") {
          openCampaign(target.dataset.id);
          return;
        }

        if (action === "close-detail") {
          closeCampaignDetail();
          return;
        }

        if (action === "select-hero") {
          state.detailSelectedHeroId = target.dataset.heroId;
          renderCampaignDetail();
          return;
        }

        if (action === "start-adventure" || action === "open-gameplay-direct") {
          startAdventure();
          return;
        }

        if (action === "close-gameplay") {
          state.activeCampaignId = null;
          state.activeHeroId = null;
          state.loadingAI = false;
          renderGameplay();
          persist();
          return;
        }

        if (action === "set-segment") {
          state.gameplaySegment = target.dataset.segment;
          renderGameplay();
          persist();
          return;
        }

        if (action === "send-action") {
          const input = document.getElementById("composeInput");
          await sendAction(input?.value || "");
          return;
        }

        if (action === "suggest-action") {
          await suggestAction();
          return;
        }

        if (action === "roll-d20") {
          const roll = Math.floor(Math.random() * 20) + 1;
          await sendAction(`תוצאת גלגול (D20): ${roll}`);
          return;
        }

        if (action === "go-settings") {
          state.tab = "settings";
          renderAll();
          return;
        }

        if (action === "save-api") {
          const input = document.getElementById("apiInput");
          state.settings.apiKey = (input?.value || "").trim();
          renderSettings();
          renderLockOverlay();
          persist();
          toast(state.settings.apiKey ? "המפתח נשמר." : "לא הוזן מפתח.");
          return;
        }

        if (action === "clear-api") {
          state.settings.apiKey = "";
          renderSettings();
          renderLockOverlay();
          persist();
          toast("המפתח הוסר.");
          return;
        }

        if (action === "toggle-demo") {
          state.settings.demoMode = !state.settings.demoMode;
          renderSettings();
          renderLockOverlay();
          persist();
          toast(state.settings.demoMode ? "מצב דמו הופעל." : "מצב דמו כובה.");
          return;
        }

        if (action === "toggle-images") {
          state.settings.freeImageMode = !state.settings.freeImageMode;
          renderAll();
          toast(state.settings.freeImageMode ? "תמונות AI חינמיות הופעלו." : "תמונות AI חינמיות כובו.");
          return;
        }

        if (action === "apply-engine") {
          toast("הגדרות מנוע הוחלו.");
          return;
        }

        if (action === "reset-engine") {
          state.engine = { temperature: 0.7, maxChars: 260, topP: 0.9, topK: 40 };
          renderGameplay();
          persist();
          toast("הגדרות מנוע אופסו.");
          return;
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "composeInput") {
          state.gameplayInput = event.target.value;
          return;
        }
      });

      document.addEventListener("change", (event) => {
        const key = event.target.dataset.engine;
        if (!key) return;
        state.engine[key] = Number(event.target.value);
        renderGameplay();
        persist();
      });

      document.addEventListener("keydown", async (event) => {
        if (event.key === "Escape") {
          if (state.activeCampaignId) {
            state.activeCampaignId = null;
            state.activeHeroId = null;
            renderGameplay();
            persist();
            return;
          }
          if (state.detailCampaignId) {
            closeCampaignDetail();
            return;
          }
        }

        if (event.key === "Enter" && !event.shiftKey && event.target?.id === "composeInput") {
          event.preventDefault();
          await sendAction(event.target.value || "");
        }
      });

      function init() {
        preloadIconBank();
        handleURLPreviewModes();
        renderAll();
        initLogoDrag();
        setupSplashTimer();
      }

      init();
    </script>
  </body>
</html>
