<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>שליט המבוך AI - תצוגת HTML</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #1c1c1e;
        --surface-2: #161618;
        --accent: #ff9f0a;
        --accent-2: #ffd673;
        --text: #f6f6f7;
        --muted: rgba(255, 255, 255, 0.64);
        --line: rgba(255, 159, 10, 0.42);
        --line-soft: rgba(255, 159, 10, 0.24);
        --shadow-accent: 0 0 18px rgba(255, 159, 10, 0.24);
        --glass: rgba(255, 255, 255, 0.04);
        --ok: #6dcb9a;
        --warn: #ffbf5a;
        --icon-bank-url: url("./master-icon-bank-hebrew-ui.png");
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        direction: rtl;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 16% 10%, rgba(255, 159, 10, 0.12), transparent 36%),
          radial-gradient(circle at 82% 18%, rgba(72, 94, 120, 0.18), transparent 38%),
          radial-gradient(circle at 60% 84%, rgba(48, 60, 76, 0.16), transparent 40%),
          var(--bg);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.008) 0,
            rgba(255, 255, 255, 0.008) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.006) 0,
            rgba(255, 255, 255, 0.006) 1px,
            transparent 1px,
            transparent 3px
          );
      }

      .page {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 22px 14px;
      }

      .phone {
        position: relative;
        width: min(430px, 95vw);
        height: min(880px, 94dvh);
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.62);
        overflow: hidden;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
      }

      .screen-stack {
        position: absolute;
        inset: 0;
      }

      .screen {
        position: absolute;
        inset: 0;
        padding: 18px 16px 98px;
        overflow-y: auto;
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
        transition:
          opacity 260ms ease,
          transform 260ms ease;
      }

      .screen.active {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .title-lg {
        margin: 0 0 14px;
        font-size: clamp(27px, 5.8vw, 36px);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }

      .title-md {
        margin: 0;
        font-size: clamp(19px, 4.8vw, 26px);
        letter-spacing: -0.02em;
      }

      .muted {
        color: var(--muted);
      }

      .glass {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
        backdrop-filter: blur(14px);
      }

      .card {
        background: linear-gradient(150deg, rgba(28, 28, 30, 0.96), rgba(18, 18, 20, 0.94));
        border: 0.5px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow-accent);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 8px;
        border: 0.5px solid rgba(255, 159, 10, 0.16);
        border-radius: 11px;
        pointer-events: none;
      }

      .btn {
        border: 0;
        border-radius: 13px;
        font: inherit;
        cursor: pointer;
        transition:
          transform 180ms ease,
          opacity 180ms ease,
          box-shadow 180ms ease;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        color: #1a1308;
        font-weight: 700;
        background: linear-gradient(130deg, var(--accent-2), var(--accent));
        box-shadow: 0 0 18px rgba(255, 159, 10, 0.4);
        padding: 10px 12px;
        font-size: 14px;
      }

      .btn-soft {
        color: var(--text);
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.04);
        padding: 8px 10px;
        font-size: 13px;
      }

      .chip {
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        padding: 4px 10px;
      }

      .image {
        width: 100%;
        display: block;
        object-fit: cover;
      }

      .image-fallback {
        background:
          linear-gradient(160deg, rgba(60, 73, 89, 0.85), rgba(12, 14, 18, 0.95)),
          linear-gradient(40deg, rgba(255, 159, 10, 0.12), transparent 60%);
      }

      .h-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 4px 2px 6px;
        scroll-snap-type: x mandatory;
      }

      .h-scroll > * {
        scroll-snap-align: start;
      }

      .h-scroll::-webkit-scrollbar {
        display: none;
      }

      .chronicle-card {
        width: 275px;
        padding: 10px;
        flex: 0 0 auto;
      }

      .chronicle-image {
        height: 144px;
        border-radius: 12px;
        overflow: hidden;
        border: 0.5px solid rgba(255, 159, 10, 0.34);
        margin-bottom: 10px;
      }

      .chronicle-card h3 {
        margin: 0;
        font-size: 24px;
        line-height: 1.12;
      }

      .chronicle-card p {
        margin: 8px 0 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .realm-card {
        width: 152px;
        flex: 0 0 auto;
        padding: 9px;
      }

      .realm-thumb {
        height: 92px;
        border-radius: 11px;
        border: 0.5px solid rgba(255, 159, 10, 0.26);
        overflow: hidden;
        margin-bottom: 8px;
      }

      .realm-card h4 {
        margin: 0;
        font-size: 18px;
      }

      .realm-card p {
        margin: 6px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .fab {
        position: absolute;
        right: 18px;
        bottom: 94px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 0;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: #1e1508;
        box-shadow: 0 0 16px rgba(255, 159, 10, 0.54);
        display: grid;
        place-items: center;
        cursor: pointer;
        z-index: 12;
      }

      .fab svg {
        width: 20px;
        height: 20px;
      }

      .tab-bar {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 18px;
        padding: 8px 6px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        background: rgba(15, 15, 17, 0.95);
        border: 0.5px solid rgba(255, 255, 255, 0.12);
        z-index: 11;
      }

      .tab-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        display: grid;
        justify-items: center;
        gap: 4px;
        padding: 5px 0 6px;
        border-radius: 12px;
        cursor: pointer;
        transition:
          color 180ms ease,
          text-shadow 180ms ease,
          background 180ms ease;
      }

      .tab-btn svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
      }

      .tab-btn.active {
        color: var(--accent);
        text-shadow: 0 0 11px rgba(255, 159, 10, 0.72);
        background: rgba(255, 159, 10, 0.08);
      }

      .tab-btn span {
        font-size: 11px;
      }

      .campaign-item {
        padding: 10px;
        margin-bottom: 12px;
      }

      .campaign-top {
        display: grid;
        grid-template-columns: 68px 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }

      .campaign-thumb {
        width: 68px;
        height: 68px;
        border-radius: 10px;
        border: 0.5px solid var(--line-soft);
        overflow: hidden;
      }

      .campaign-item h4 {
        margin: 0;
        font-size: 23px;
        line-height: 1.1;
      }

      .progress {
        height: 6px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        overflow: hidden;
        margin: 8px 0 6px;
      }

      .progress > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent-2), var(--accent));
      }

      .campaign-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .codex-row {
        display: grid;
        grid-template-columns: 60px 1fr;
        gap: 10px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .codex-row-thumb {
        width: 60px;
        height: 60px;
        border-radius: 10px;
        overflow: hidden;
        border: 0.5px solid var(--line-soft);
      }

      .codex-row h4 {
        margin: 0;
        font-size: 21px;
      }

      .codex-row p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .codex-grid {
        margin-top: 6px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .codex-cell {
        padding: 10px;
      }

      .codex-cell .codex-row-thumb {
        width: 100%;
        height: 92px;
        margin-bottom: 8px;
      }

      .settings-box {
        padding: 11px;
        margin-bottom: 12px;
      }

      .field-label {
        display: block;
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        color: var(--text);
        font: inherit;
        background: rgba(8, 9, 11, 0.86);
        border: 0.5px solid rgba(255, 159, 10, 0.34);
        border-radius: 11px;
        padding: 11px 12px;
        direction: rtl;
        text-align: right;
      }

      .textarea {
        resize: vertical;
        min-height: 110px;
      }

      .input:focus,
      .textarea:focus,
      .select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.16);
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 0.5px solid var(--line-soft);
        border-radius: 12px;
        padding: 10px 12px;
        margin-top: 9px;
        background: rgba(255, 255, 255, 0.02);
      }

      .toggle strong {
        display: block;
        font-size: 14px;
      }

      .toggle small {
        color: var(--muted);
      }

      .switch {
        width: 45px;
        height: 27px;
        border: 0.5px solid rgba(255, 159, 10, 0.4);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        position: relative;
        cursor: pointer;
      }

      .switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 21px;
        height: 21px;
        border-radius: 50%;
        background: #fff;
        transition: transform 180ms ease;
      }

      .switch.active {
        background: rgba(255, 159, 10, 0.35);
      }

      .switch.active::after {
        transform: translateX(18px);
      }

      .stack-sm {
        display: grid;
        gap: 10px;
      }

      .actions {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
      }

      .actions .btn {
        flex: 1;
        min-width: 120px;
      }

      .lock-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
        display: none;
        place-items: center;
        z-index: 15;
        padding: 18px;
      }

      .lock-overlay.active {
        display: grid;
      }

      .lock-card {
        width: 100%;
        max-width: 360px;
        padding: 18px;
      }

      .lock-card h3 {
        margin: 0 0 8px;
        font-size: 25px;
      }

      .lock-card p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.74);
        display: none;
        align-items: flex-end;
        justify-content: center;
        z-index: 40;
      }

      .modal.active {
        display: flex;
      }

      .sheet {
        width: min(440px, 96vw);
        max-height: 92dvh;
        border-radius: 20px 20px 0 0;
        border: 0.5px solid var(--line-soft);
        background: linear-gradient(165deg, rgba(26, 27, 31, 0.98), rgba(11, 11, 12, 0.98));
        box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
        transform: translateY(24px);
        opacity: 0;
        animation: sheetIn 230ms ease forwards;
        overflow: hidden;
      }

      @keyframes sheetIn {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .sheet-body {
        max-height: calc(92dvh - 24px);
        overflow-y: auto;
        padding: 14px;
      }

      .step-header {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
        margin: 0 0 14px;
      }

      .step-dot {
        height: 5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
      }

      .step-dot.active {
        background: var(--accent);
      }

      .styles-grid {
        display: flex;
        gap: 9px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .style-card {
        width: 136px;
        padding: 9px;
        border-radius: 13px;
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
      }

      .style-card.active {
        border-color: var(--accent);
        box-shadow: var(--shadow-accent);
      }

      .style-thumb {
        width: 100%;
        height: 94px;
        border-radius: 10px;
        border: 0.5px solid var(--line-soft);
        overflow: hidden;
        margin-bottom: 6px;
      }

      .wizard-actions {
        display: flex;
        gap: 9px;
        margin-top: 12px;
      }

      .wizard-actions .btn {
        flex: 1;
      }

      .gameplay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: none;
        z-index: 35;
      }

      .gameplay.active {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .gp-top {
        padding: env(safe-area-inset-top, 12px) 12px 9px;
        background: rgba(8, 8, 10, 0.96);
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      }

      .gp-headline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 9px;
      }

      .gp-headline h3 {
        margin: 0;
        font-size: 18px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .segment {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        border: 0.5px solid var(--line);
        border-radius: 13px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
      }

      .segment button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 10px;
        cursor: pointer;
        font: inherit;
      }

      .segment button.active {
        color: #1f1608;
        font-weight: 700;
        background: linear-gradient(130deg, var(--accent-2), var(--accent));
      }

      .gp-body {
        min-height: 0;
        overflow-y: auto;
      }

      .chat-wrap {
        min-height: 100%;
      }

      .parallax {
        position: relative;
        height: 236px;
        overflow: hidden;
      }

      .parallax img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translateY(0);
        transition: transform 40ms linear;
      }

      .parallax::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.14), rgba(0, 0, 0, 0.82) 86%, var(--bg));
      }

      .chat-log {
        padding: 12px 10px 10px;
        display: grid;
        gap: 10px;
        direction: ltr;
      }

      .msg {
        max-width: 92%;
        border-radius: 14px;
        border: 0.5px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 12px;
        white-space: pre-wrap;
        animation: msgIn 220ms ease;
        direction: rtl;
        text-align: right;
      }

      .msg.assistant {
        justify-self: start;
        font-family: "New York", Georgia, "Times New Roman", serif;
        line-height: 1.38;
        font-size: 18px;
      }

      .msg.user {
        justify-self: end;
        font-size: 20px;
        font-weight: 700;
      }

      .msg.system {
        justify-self: center;
        color: var(--muted);
        font-size: 12px;
      }

      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gp-settings {
        padding: 14px 12px 18px;
      }

      .slider-row {
        margin-bottom: 12px;
      }

      .slider-row label {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--text);
        font-size: 14px;
        margin-bottom: 6px;
      }

      .slider-row input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .gp-compose {
        border-top: 0.5px solid rgba(255, 255, 255, 0.11);
        background: rgba(10, 10, 12, 0.97);
        padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }

      .compose-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
      }

      .compose-row .input {
        font-size: 16px;
      }

      .d20-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 0.5px solid var(--line);
        background: rgba(255, 159, 10, 0.1);
        color: var(--accent);
        box-shadow: 0 0 12px rgba(255, 159, 10, 0.34);
      }

      .d20-btn svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
      }

      .send-btn {
        width: 44px;
        height: 44px;
      }

      .top-note {
        margin: 0 0 8px;
        color: var(--warn);
        font-size: 12px;
      }

      .toast {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translate(-50%, -16px);
        opacity: 0;
        pointer-events: none;
        padding: 10px 13px;
        border-radius: 999px;
        border: 0.5px solid var(--line);
        background: rgba(20, 21, 23, 0.95);
        box-shadow: 0 0 14px rgba(255, 159, 10, 0.25);
        transition:
          opacity 200ms ease,
          transform 200ms ease;
        z-index: 120;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .splash {
        position: absolute;
        inset: 0;
        z-index: 90;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, rgba(255, 159, 10, 0.13), transparent 33%),
          linear-gradient(160deg, #0b0d12, #060606 60%, #090a0f);
        transition: opacity 460ms ease;
      }

      .splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      .logo-wrap {
        text-align: center;
      }

      .logo-ring {
        width: 166px;
        height: 166px;
        margin: 0 auto 18px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle, rgba(255, 214, 115, 0.24), rgba(255, 159, 10, 0.02));
        animation: pulse 1.25s ease-in-out infinite;
        box-shadow: 0 0 28px rgba(255, 159, 10, 0.26);
        cursor: grab;
        touch-action: none;
        user-select: none;
        will-change: transform;
        transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0);
      }

      .logo-ring.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .logo-ring svg {
        width: 92px;
        height: 92px;
        fill: url(#logoGradient);
      }

      .logo-wrap h1 {
        margin: 0;
        font-size: clamp(34px, 7vw, 52px);
        letter-spacing: 0.01em;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(0.95);
          opacity: 0.85;
        }
        50% {
          transform: translate3d(var(--drag-x, 0px), var(--drag-y, 0px), 0) scale(1.02);
          opacity: 1;
        }
      }

      .inline-icon {
        display: inline-flex;
        width: 18px;
        height: 18px;
        vertical-align: middle;
      }

      .inline-icon svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .icon-bank {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background-image: var(--icon-bank-url);
        background-repeat: no-repeat;
        background-size: 1024px 576px;
      }

      .icon-bank.fallback svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="phone">
        <div class="screen-stack">
          <section id="screen-home" class="screen"></section>
          <section id="screen-campaigns" class="screen"></section>
          <section id="screen-codex" class="screen"></section>
          <section id="screen-settings" class="screen"></section>
        </div>

        <button id="fabNew" class="fab" data-action="open-setup" aria-label="ממלכה חדשה"></button>

        <nav id="tabBar" class="tab-bar"></nav>

        <div id="lockOverlay" class="lock-overlay"></div>

        <div id="splash" class="splash">
          <div class="logo-wrap">
            <div class="logo-ring" id="splashLogoRing">
              <svg viewBox="0 0 128 128" aria-hidden="true">
                <defs>
                  <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffd673"></stop>
                    <stop offset="100%" stop-color="#ff9f0a"></stop>
                  </linearGradient>
                </defs>
                <path
                  d="M94 24c-7-8-18-13-30-13-20 0-36 16-36 36 0 11 5 21 13 28-1-7 1-15 7-21 6-7 15-10 24-10 5 0 10 1 14 4-2 1-4 2-5 5 4-1 8-1 12 1 7 4 11 12 11 20 0 14-11 26-25 27 18 4 36-8 41-26 4-17-4-36-20-45-2-1-4-2-6-3z"
                ></path>
              </svg>
            </div>
            <h1>שליט המבוך AI</h1>
          </div>
        </div>
      </div>
    </div>

    <div id="setupModal" class="modal"></div>
    <div id="summaryModal" class="modal"></div>
    <div id="codexDetailModal" class="modal"></div>
    <div id="codexAddModal" class="modal"></div>
    <div id="gameplay" class="gameplay"></div>
    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEY = "dmai_html_preview_v2";

      const REALMS = [
        {
          title: "אימה גותית",
          subtitle: "מצודות מקוללות ונדרים אסורים.",
          prompt: "dark gothic castle in storm cinematic fantasy hebrew rpg",
        },
        {
          title: "פנטזיה גבוהה",
          subtitle: "ממלכות עתיקות ושרידי עוצמה אגדיים.",
          prompt: "epic high fantasy city at sunset matte painting hebrew rpg",
        },
        {
          title: "סייבר-פאנק מאגי",
          subtitle: "גשם ניאון ונבואה מלאכותית.",
          prompt: "dark cyberpunk alley neon rain cinematic fantasy",
        },
        {
          title: "ימים מיתיים",
          subtitle: "לווייתנים קמאיים ומקדשי סערה.",
          prompt: "mythic ocean temple lightning waves concept art dark fantasy",
        },
      ];

      const STYLE_PROMPTS = {
        קשוח: "grim dark knight in ash battlefield, muted palette",
        הרואי: "heroic paladin in golden light cinematic",
        כאוטי: "shadow rogue with arcane aura, mysterious fantasy",
      };

      const CLASS_OPTIONS = [
        "סייר / נווד",
        "פלדין / נודר-שבועה",
        "קוסם / מלומד",
        "גנב / מרגל",
        "כוהן / צליין",
      ];

      const KINDS = ["דמות", "חפץ", "מיקום", "סיעה"];

      function uid() {
        return Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      function seedCampaigns() {
        return [
          {
            id: uid(),
            title: "מצודת האובסידיאן - פרק 3",
            genre: "אימה גותית",
            chapter: 3,
            heroName: "אלארה ואנס",
            classBackground: "סייר / אצילה גולה",
            style: "קשוח",
            imagePrompt: "obsidian castle under thunderstorm, dark fantasy",
            totalPlayedMinutes: 270,
            lastPlayedAt: Date.now() - 1000 * 60 * 90,
            finished: false,
            summary:
              "אלארה חצתה את השער השבור וחשפה רונות מתחת לקפלה, במקום שבו השרשראות עדיין רועדות.",
            messages: [
              {
                id: uid(),
                role: "assistant",
                text: "מחטי גשם ננעצות בחומות הסדוקות, ואור הלפידים חושף סמלים עתיקים ספוגי דם על רצפת האבן.",
                ts: Date.now() - 1000 * 60 * 60,
              },
            ],
          },
          {
            id: uid(),
            title: "קללת סטראהד - סשן 1",
            genre: "אימה גותית",
            chapter: 1,
            heroName: "תורן וייל",
            classBackground: "כוהן / צליין",
            style: "הרואי",
            imagePrompt: "misty haunted village and looming castle gothic",
            totalPlayedMinutes: 75,
            lastPlayedAt: Date.now() - 1000 * 60 * 60 * 14,
            finished: false,
            summary: "פעמון רחוק צלצל כאשר תורן צעד אל העמק החנוק בערפל.",
            messages: [],
          },
          {
            id: uid(),
            title: "המכרה האבוד של פננדלבר - הושלם",
            genre: "פנטזיה גבוהה",
            chapter: 5,
            heroName: "אריק סטון",
            classBackground: "פלדין / נודר-שבועה",
            style: "הרואי",
            imagePrompt: "ancient dwarven mine entrance with glowing runes",
            totalPlayedMinutes: 420,
            lastPlayedAt: Date.now() - 1000 * 60 * 60 * 40,
            finished: true,
            summary:
              "לב הכבשן הוצת מחדש, העכביש השחור הובס, והמכרה הושב לתושבי פנדלין.",
            messages: [],
          },
        ];
      }

      function seedCodex() {
        return [
          {
            id: uid(),
            title: "אבירי הגבורה",
            kind: "סיעה",
            lore: "מסדר עתיק שנשבע להגן על מקדשי הגחלת מפני פלישות ילידי-צל.",
            imagePrompt: "fantasy order banner and ancient tome",
          },
          {
            id: uid(),
            title: "דמות מסתורית",
            kind: "דמות",
            lore: "נווד עטוי ברדס שמופיע בכל מקום שבו אור הירח נוגע במזבחות חרבים.",
            imagePrompt: "hooded character in dark alley fantasy",
          },
          {
            id: uid(),
            title: "דרקון קדום",
            kind: "דמות",
            lore: "תנין-אש רדום מתחת לרכסי בזלת, הממתין לאות האחרון.",
            imagePrompt: "ancient dragon on mountain cliff cinematic",
          },
          {
            id: uid(),
            title: "שריד זוהר",
            kind: "חפץ",
            lore: "שריד שבור הפועם בכל פעם שסכנה מתקרבת.",
            imagePrompt: "glowing magical artifact in dark chamber",
          },
          {
            id: uid(),
            title: "טום עתיק",
            kind: "חפץ",
            lore: "קודקס כרוך עור שדפיו נכתבים מחדש בכל חצות.",
            imagePrompt: "old magical book on table candle light",
          },
        ];
      }

      function defaultState() {
        return {
          tab: "home",
          setupOpen: false,
          setupStep: 0,
          setup: {
            heroName: "",
            classBackground: CLASS_OPTIONS[0],
            style: "קשוח",
            genre: REALMS[0].title,
            campaignTitle: "",
          },
          activeCampaignId: null,
          gameplaySegment: "adventure",
          gameplayInput: "",
          loadingAI: false,
          summaryCampaignId: null,
          codexDetailId: null,
          codexAddOpen: false,
          addCodex: {
            title: "",
            kind: "דמות",
            lore: "",
          },
          engine: {
            temperature: 0.7,
            maxChars: 250,
            topP: 0.9,
            topK: 40,
          },
          settings: {
            apiKey: "",
            demoMode: false,
            freeImageMode: true,
          },
          campaigns: seedCampaigns(),
          codex: seedCodex(),
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          const parsed = JSON.parse(raw);
          const base = defaultState();
          return {
            ...base,
            ...parsed,
            setup: { ...base.setup, ...(parsed.setup || {}) },
            addCodex: { ...base.addCodex, ...(parsed.addCodex || {}) },
            settings: { ...base.settings, ...(parsed.settings || {}) },
            engine: { ...base.engine, ...(parsed.engine || {}) },
            campaigns: Array.isArray(parsed.campaigns) && parsed.campaigns.length ? parsed.campaigns : base.campaigns,
            codex: Array.isArray(parsed.codex) && parsed.codex.length ? parsed.codex : base.codex,
          };
        } catch {
          return defaultState();
        }
      }

      const state = loadState();

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function maskedKey(key) {
        if (!key || key.length < 8) return "";
        return key.slice(0, 4) + "••••••" + key.slice(-4);
      }

      function isUnlocked() {
        return Boolean(state.settings.apiKey) || state.settings.demoMode;
      }

      function canCallOpenAI() {
        return Boolean(state.settings.apiKey) && !state.settings.demoMode;
      }

      function getImageUrl(prompt, seed = 1) {
        if (!state.settings.freeImageMode || !prompt) return "";
        const encoded = encodeURIComponent(prompt);
        return `https://image.pollinations.ai/prompt/${encoded}?model=flux&width=1024&height=576&nologo=true&seed=${seed}`;
      }

      function toast(message) {
        const el = document.getElementById("toast");
        el.textContent = message;
        el.classList.add("show");
        window.clearTimeout(toast.timer);
        toast.timer = window.setTimeout(() => {
          el.classList.remove("show");
        }, 2400);
      }

      function relTime(ms) {
        const diff = Date.now() - ms;
        const min = Math.floor(diff / 60000);
        if (min < 60) return `לפני ${min} ד׳`;
        const hr = Math.floor(min / 60);
        if (hr < 24) return `לפני ${hr} ש׳`;
        const d = Math.floor(hr / 24);
        return `לפני ${d} ימים`;
      }

      function playedText(minutes) {
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        if (h > 0) return `${h}ש׳ ${m}ד׳ משחק`;
        return `${m}ד׳ משחק`;
      }

      function icon(name) {
        const map = {
          plus: `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
          home: `<svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>`,
          book: `<svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h5a3 3 0 0 1 3 3v15a3 3 0 0 0-3-3H6a2 2 0 0 0-2 2z"/><path d="M20 5a2 2 0 0 0-2-2h-5a3 3 0 0 0-3 3v15a3 3 0 0 1 3-3h5a2 2 0 0 1 2 2z"/></svg>`,
          codex: `<svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="m9 8 3-2 3 2-3 2z"/><path d="M12 10v7"/></svg>`,
          shield: `<svg viewBox="0 0 24 24"><path d="M12 3 20 6v6c0 5-3.5 8.7-8 10-4.5-1.3-8-5-8-10V6z"/><path d="M10 11a4 4 0 0 1 6 0"/></svg>`,
          gear: `<svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/><path d="M3 12h2m14 0h2M12 3v2m0 14v2M5.5 5.5l1.4 1.4m10.2 10.2 1.4 1.4m0-12.9-1.4 1.4M6.9 17.1l-1.4 1.4"/></svg>`,
          wand: `<svg viewBox="0 0 24 24"><path d="m3 21 10-10"/><path d="m14 4 1-3m2 4 3-1m-1 5 3 1m-5 2 1 3M6 8l2-2m0 0 2 2m-2-2V3m0 3H5"/></svg>`,
          send: `<svg viewBox="0 0 24 24"><path d="M3 12 21 3l-7 18-2.8-6.2z"/><path d="M21 3 11.2 14.8"/></svg>`,
          back: `<svg viewBox="0 0 24 24"><path d="M15 19 8 12l7-7"/><path d="M8 12h13"/></svg>`,
          lock: `<svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`,
          dice: `<svg viewBox="0 0 24 24"><path d="M12 2 3 7l9 5 9-5z"/><path d="m3 7 9 5v10l-9-5z"/><path d="m21 7-9 5v10l9-5z"/><text x="12" y="15.3" text-anchor="middle" font-size="6" fill="currentColor" stroke="none">20</text></svg>`,
        };
        return map[name] || "";
      }

      const ICON_BANK_COORDS = {
        home: { off: [-572, -78], on: [-572, -136] },
        book: { off: [-630, -78], on: [-630, -136] },
        codex: { off: [-688, -78], on: [-688, -136] },
        shield: { off: [-744, -78], on: [-744, -136] },
        gear: { off: [-806, -78], on: [-806, -136] },
        back: { off: [-574, -194], on: [-574, -252] },
        wand: { off: [-630, -194], on: [-630, -252] },
        plus: { off: [-689, -194], on: [-744, -252] },
        send: { off: [-803, -194], on: [-803, -252] },
        eye: { off: [-688, -194], on: [-688, -252] },
        "eye-off": { off: [-744, -194], on: [-744, -252] },
        dice: { off: [-575, -311], on: [-633, -311] },
        lock: { off: [-860, -311], on: [-860, -311] },
      };

      let iconBankReady = false;

      function iconFromBank(name, active = false) {
        if (!iconBankReady) {
          return `<span class="icon-bank fallback">${icon(name)}</span>`;
        }
        const coords = ICON_BANK_COORDS[name];
        if (!coords) {
          return `<span class="icon-bank fallback">${icon(name)}</span>`;
        }
        const [x, y] = active ? coords.on : coords.off;
        return `<span class="icon-bank" style="background-position:${x}px ${y}px;${active ? "filter:drop-shadow(0 0 8px rgba(255,159,10,.62));" : ""}"></span>`;
      }

      function preloadIconBank() {
        const img = new Image();
        img.onload = () => {
          iconBankReady = true;
          renderScreens();
        };
        img.onerror = () => {
          iconBankReady = false;
        };
        img.src = "./master-icon-bank-hebrew-ui.png";
      }

      function imgOrFallback(prompt, cls = "image", seed = 1) {
        const src = getImageUrl(prompt, seed);
        if (!src) return `<div class="${cls} image-fallback"></div>`;
        return `<img class="${cls}" src="${src}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'${cls} image-fallback'}))" />`;
      }

      function renderTabBar() {
        const tabs = [
          { key: "home", label: "בית", icon: "home" },
          { key: "campaigns", label: "קמפיינים", icon: "shield" },
          { key: "codex", label: "קודקס", icon: "codex" },
          { key: "settings", label: "הגדרות", icon: "gear" },
        ];
        document.getElementById("tabBar").innerHTML = tabs
          .map(
            (tab) => `
              <button class="tab-btn ${state.tab === tab.key ? "active" : ""}" data-action="set-tab" data-tab="${tab.key}">
                ${iconFromBank(tab.icon, state.tab === tab.key)}
                <span>${tab.label}</span>
              </button>
            `
          )
          .join("");
      }

      function renderHome() {
        const topCampaigns = [...state.campaigns]
          .sort((a, b) => b.lastPlayedAt - a.lastPlayedAt)
          .slice(0, 6);

        document.getElementById("screen-home").innerHTML = `
          <h2 class="title-lg">הכרוניקות שלך</h2>
          <div class="h-scroll">
            ${topCampaigns
              .map(
                (campaign, index) => `
                  <article class="card chronicle-card">
                    <div class="chronicle-image">
                      ${imgOrFallback(campaign.imagePrompt, "image", index + 1)}
                    </div>
                    <h3>${escapeHTML(campaign.title)}</h3>
                    <p>${escapeHTML(campaign.summary || "אות אפל מהדהד ברחבי הממלכה.")}</p>
                    <button class="btn btn-soft" data-action="resume-campaign" data-id="${campaign.id}">
                      המשך
                    </button>
                  </article>
                `
              )
              .join("")}
          </div>

          <h3 class="title-md" style="margin: 10px 0 10px">חקירת ממלכות חדשות</h3>
          <div class="h-scroll">
            ${REALMS.map(
              (realm, index) => `
                <article class="card realm-card" data-action="new-realm" data-genre="${realm.title}">
                  <div class="realm-thumb">
                    ${imgOrFallback(realm.prompt, "image", index + 13)}
                  </div>
                  <h4>${escapeHTML(realm.title)}</h4>
                  <p>${escapeHTML(realm.subtitle)}</p>
                </article>
              `
            ).join("")}
          </div>
        `;
      }

      function renderCampaigns() {
        const campaigns = [...state.campaigns].sort((a, b) => b.lastPlayedAt - a.lastPlayedAt);
        document.getElementById("screen-campaigns").innerHTML = `
          <h2 class="title-lg">הקמפיינים שלי</h2>
          ${campaigns
            .map((campaign, index) => {
              const progress = Math.min(100, Math.round((campaign.totalPlayedMinutes / 420) * 100));
              return `
                <article class="card campaign-item">
                  <div class="campaign-top">
                    <div class="campaign-thumb">
                      ${imgOrFallback(campaign.imagePrompt, "image", index + 40)}
                    </div>
                    <div>
                      <h4>${escapeHTML(campaign.title)}</h4>
                      <div class="progress"><span style="width:${progress}%"></span></div>
                      <small class="muted">${playedText(campaign.totalPlayedMinutes)}</small>
                    </div>
                  </div>
                  <div class="campaign-bottom">
                    <small class="muted">${
                      campaign.finished ? "הסתיים" : `שוחק לאחרונה: ${relTime(campaign.lastPlayedAt)}`
                    }</small>
                    ${
                      campaign.finished
                        ? `<button class="btn btn-primary" data-action="view-summary" data-id="${campaign.id}">צפה בתקציר</button>`
                        : `<button class="btn btn-primary" data-action="resume-campaign" data-id="${campaign.id}">המשך</button>`
                    }
                  </div>
                </article>
              `;
            })
            .join("")}
        `;
      }

      function renderCodex() {
        const primary = state.codex.slice(0, 3);
        const grid = state.codex.slice(3);
        document.getElementById("screen-codex").innerHTML = `
          <h2 class="title-lg">קודקס</h2>
          ${primary
            .map(
              (card, idx) => `
                <article class="card codex-row" data-action="codex-detail" data-id="${card.id}">
                  <div class="codex-row-thumb">
                    ${imgOrFallback(card.imagePrompt, "image", idx + 70)}
                  </div>
                  <div>
                    <h4>${escapeHTML(card.title)}</h4>
                    <p>${escapeHTML(card.lore)}</p>
                  </div>
                </article>
              `
            )
            .join("")}

          <section class="codex-grid">
            ${grid
              .map(
                (card, idx) => `
                  <article class="card codex-cell" data-action="codex-detail" data-id="${card.id}">
                    <div class="codex-row-thumb">
                      ${imgOrFallback(card.imagePrompt, "image", idx + 90)}
                    </div>
                    <h4 style="margin:0;font-size:19px">${escapeHTML(card.title)}</h4>
                    <p class="muted" style="margin:6px 0 0;font-size:13px">${escapeHTML(card.lore)}</p>
                  </article>
                `
              )
              .join("")}
          </section>
        `;
      }

      function renderSettings() {
        const hasKey = Boolean(state.settings.apiKey);
        document.getElementById("screen-settings").innerHTML = `
          <h2 class="title-lg">הגדרות</h2>
          <section class="card settings-box stack-sm">
            <div>
              <label class="field-label" for="apiKeyInput">מפתח OpenAI</label>
              <input id="apiKeyInput" class="input" data-bind="apiKeyInput" type="password" placeholder="sk-..." value="${escapeAttr(
                state.settings.apiKey
              )}" />
              ${
                hasKey
                  ? `<small class="muted">מפתח שמור: ${maskedKey(state.settings.apiKey)}</small>`
                  : `<small class="muted">האפליקציה נעולה עד להגדרת מפתח, אלא אם מצב דמו זמני פעיל.</small>`
              }
            </div>
            <div class="actions">
              <button class="btn btn-primary" data-action="save-api-key">שמור מפתח</button>
              <button class="btn btn-soft" data-action="clear-api-key">נקה</button>
            </div>
          </section>

          <section class="card settings-box stack-sm">
            <div class="toggle">
              <div>
                <strong>מצב דמו זמני</strong>
                <small>להפעלת בדיקות UI עם AI מקומי ללא מפתח אמיתי.</small>
              </div>
              <button class="switch ${state.settings.demoMode ? "active" : ""}" data-action="toggle-demo"></button>
            </div>
            <button class="btn btn-soft" data-action="use-demo-fast">הפעל דמו במהירות</button>
          </section>

          <section class="card settings-box stack-sm">
            <div class="toggle">
              <div>
                <strong>API חינמי לתמונות (ללא מפתח)</strong>
                <small>משתמש ב‑Pollinations לויזואליה זמנית בפיתוח.</small>
              </div>
              <button class="switch ${state.settings.freeImageMode ? "active" : ""}" data-action="toggle-free-images"></button>
            </div>
            <button class="btn btn-soft" data-action="regenerate-images">רענן זרעי תמונות</button>
          </section>

          <section class="card settings-box">
            <small class="muted">
              לפרודקשן: מומלץ לכבות מצב דמו ולהשתמש במפתח OpenAI אמיתי.
            </small>
          </section>
        `;

      async function autoFillSetup() {
        const waiting = document.querySelector('[data-action="wand-autofill"]');
        if (waiting) waiting.disabled = true;
        try {
          if (canCallOpenAI()) {
            const messages = [
              {
                role: "system",
                content: "ענה בעברית בלבד וב‑JSON בלבד.",
              },
              {
                role: "user",
                content:
                  'צור JSON בעברית לדמות פנטזיה אפלה עם המפתחות: heroName, classBackground, style, campaignTitle. style חייב להיות אחד מתוך: קשוח, הרואי, כאוטי.',
              },
            ];
            const text = await callOpenAI(messages, 0.9, 180);
            const start = text.indexOf("{");
            const end = text.lastIndexOf("}");
            const json = JSON.parse(start >= 0 ? text.slice(start, end + 1) : text);
            state.setup.heroName = json.heroName || state.setup.heroName;
            state.setup.classBackground = json.classBackground || state.setup.classBackground;
            if (["קשוח", "הרואי", "כאוטי"].includes(json.style)) state.setup.style = json.style;
            state.setup.campaignTitle = json.campaignTitle || state.setup.campaignTitle;
          } else {
            const names = ["אלארה ואנס", "קאל דרייבן", "נירה הולו", "תורן וייל", "סרן אש"];
            state.setup.heroName = names[Math.floor(Math.random() * names.length)];
            state.setup.classBackground = CLASS_OPTIONS[Math.floor(Math.random() * CLASS_OPTIONS.length)];
            const styles = ["קשוח", "הרואי", "כאוטי"];
            state.setup.style = styles[Math.floor(Math.random() * styles.length)];
            state.setup.campaignTitle = `${state.setup.genre} - סשן 1`;
          }
          toast("טיוטת גיבור מולאה אוטומטית.");
        } catch {
          toast("מילוי אוטומטי נכשל. נסה שוב.");
        }
        if (waiting) waiting.disabled = false;
        renderSetupModal();
      }

        const title =

        const campaign = {
          id: uid(),

          lastPlayedAt: Date.now(),

          summary: "המסע החל תחת שמיים של גחלים לוחשות.",
          messages: [
            {
              id: uid(),
              role: "assistant",
              text: `${state.setup.heroName.trim()} נכנס/ת לממלכה של אפר ונבואה. רוח קרה נושאת ריח ברזל ואש ישנה. מה הפעולה הראשונה שלך?`,
              ts: Date.now(),

      function localNarration(input, campaign) {
        const options = [
          `קרן רחוקה עונה לפעולתך. בין ההריסות שלפנים אור לפידים חושף גרם מדרגות נסתר היורד אל אבן שחורה.`,
          `האוויר מתכווץ כשהבחירה שלך מהדהדת בחדר. אבק נושר מקשת האבן וחושף סמל נשכח של הכתר הישן.`,
          `למילים שלך יש משקל. מתוך הערפל מופיעה דמות עטוית גלימה ולוחשת: "איחרת, ${campaign.heroName}."`,
          `פלדה שרה בחשכה. הצללים נסוגים, ושער עתיק נפתח בחריקה ונושף כפור ותפילות נשכחות.`,
        ];
        const picked = options[Math.floor(Math.random() * options.length)];
        return `${picked}\n\n(סגנון: ${campaign.style} | עולם: ${campaign.genre})`;
      }

      function updateSummary(campaign) {
        const assistant = (campaign.messages || []).filter((m) => m.role === "assistant").slice(-2);
        if (assistant.length) {
          campaign.summary = assistant.map((m) => m.text).join(" ");
        }
      }

      async function sendUserAction(text) {
        const campaign = state.campaigns.find((c) => c.id === state.activeCampaignId);
        if (!campaign) return;
        const clean = text.trim();
        if (!clean) return;
        if (!isUnlocked()) {
          toast("נדרש מפתח OpenAI או מצב דמו.");
          return;
        }

        campaign.messages.push({ id: uid(), role: "user", text: clean, ts: Date.now() });
        state.loadingAI = true;
        state.gameplayInput = "";
        campaign.lastPlayedAt = Date.now();
        campaign.totalPlayedMinutes += 1;
        renderGameplay();
        vibrate([15, 10, 15]);

        let aiText = "";
        try {
          if (canCallOpenAI()) {
            const history = [
              {
                role: "system",
                content: `אתה שליט המבוך AI. כתוב בעברית בלבד בסגנון קולנועי של פנטזיה אפלה. שמור רצף עלילתי. גיבור: ${campaign.heroName}. מקצוע/רקע: ${campaign.classBackground}. טון: ${campaign.style}.`,
              },
              ...(campaign.messages || []).slice(-16).map((m) => ({
                role: m.role === "assistant" ? "assistant" : "user",
                content: m.text,
              })),
            ];
            aiText = await callOpenAI(history, state.engine.temperature, Math.round(state.engine.maxChars / 4));
          } else {
            aiText = localNarration(clean, campaign);
          }
        } catch {
          aiText = localNarration(clean, campaign);
          toast("קריאת OpenAI נכשלה, הופעלה תגובת גיבוי.");
        }

        campaign.messages.push({ id: uid(), role: "assistant", text: aiText, ts: Date.now() });
        updateSummary(campaign);
        state.loadingAI = false;
        renderGameplay();
        vibrate(20);
      }

      async function callOpenAI(messages, temperature, maxTokens) {
        const payload = {
          model: "gpt-4o-mini",
          temperature,
          top_p: state.engine.topP,
          max_tokens: Math.max(64, maxTokens),
          messages,
        };
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${state.settings.apiKey}`,
          },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error("קריאת OpenAI נכשלה");
        }
        const json = await response.json();
        const text = json?.choices?.[0]?.message?.content || "";
        if (!text.trim()) throw new Error("No AI content");
        return text.trim();
      }

      function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
      }

      function setSplash() {
        const splash = document.getElementById("splash");

      function initLogoDrag() {
        const ring = document.getElementById("splashLogoRing");
        if (!ring) return;

        let activePointer = null;
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let rafId = 0;

        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

        const animate = () => {
          currentX += (targetX - currentX) * 0.2;
          currentY += (targetY - currentY) * 0.2;
          ring.style.setProperty("--drag-x", `${currentX.toFixed(2)}px`);
          ring.style.setProperty("--drag-y", `${currentY.toFixed(2)}px`);

          const stillMoving = Math.abs(targetX - currentX) > 0.15 || Math.abs(targetY - currentY) > 0.15;
          if (stillMoving) {
            rafId = requestAnimationFrame(animate);
          } else {
            rafId = 0;
          }
        };

        const startAnimation = () => {
          if (!rafId) rafId = requestAnimationFrame(animate);
        };

        const releaseDrag = () => {
          activePointer = null;
          targetX = 0;
          targetY = 0;
          ring.classList.remove("dragging");
          startAnimation();
        };

        ring.addEventListener("pointerdown", (event) => {
          activePointer = event.pointerId;
          ring.classList.add("dragging");
          ring.setPointerCapture(event.pointerId);
        });

        ring.addEventListener("pointermove", (event) => {
          if (activePointer !== event.pointerId) return;
          const rect = ring.getBoundingClientRect();
          const dx = event.clientX - (rect.left + rect.width / 2);
          const dy = event.clientY - (rect.top + rect.height / 2);
          targetX = clamp(dx * 0.35, -26, 26);
          targetY = clamp(dy * 0.35, -20, 20);
          startAnimation();
        });

        ring.addEventListener("pointerup", releaseDrag);
        ring.addEventListener("pointercancel", releaseDrag);
        ring.addEventListener("pointerleave", () => {
          if (activePointer !== null) releaseDrag();
        });
      }

      function escapeHTML(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeAttr(text) {
        return escapeHTML(text).replaceAll('"', "&quot;");
      }

      function resetEngine() {
        state.engine = { temperature: 0.7, maxChars: 250, topP: 0.9, topK: 40 };
      }

      document.addEventListener("click", async (event) => {
        if (event.target.classList?.contains("modal") && event.target.classList.contains("active")) {
          if (event.target.id === "setupModal") state.setupOpen = false;
          if (event.target.id === "summaryModal") state.summaryCampaignId = null;
          if (event.target.id === "codexDetailModal") state.codexDetailId = null;
          if (event.target.id === "codexAddModal") state.codexAddOpen = false;
          renderScreens();
          return;
        }

        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;

        if (action === "set-tab") {
          state.tab = target.dataset.tab;
          renderScreens();
          return;
        }

        if (action === "open-settings") {
          state.tab = "settings";
          renderScreens();
          return;
        }

        if (action === "open-setup") {
          openSetup();
          return;
        }

        if (action === "new-realm") {
          openSetup(target.dataset.genre);
          return;
        }

        if (action === "close-setup") {
          closeSetup();
          return;
        }

        if (action === "setup-next") {
          state.setupStep = Math.min(2, state.setupStep + 1);
          renderSetupModal();
          return;
        }

        if (action === "setup-prev") {
          state.setupStep = Math.max(0, state.setupStep - 1);
          renderSetupModal();
          return;
        }

        if (action === "wand-autofill") {
          await autoFillSetup();
          return;
        }

        if (action === "pick-style") {
          state.setup.style = target.dataset.style;
          renderSetupModal();
          return;
        }

        if (action === "begin-adventure") {
          beginAdventure();
          return;
        }

        if (action === "resume-campaign") {
          const id = target.dataset.id;
          const c = state.campaigns.find((x) => x.id === id);
          if (!c) return;
          if (!isUnlocked()) {
            toast("פתח הגדרות כדי להוסיף מפתח או להפעיל מצב דמו זמני.");
            state.tab = "settings";
            renderScreens();
            return;
          }
          state.activeCampaignId = id;
          state.gameplaySegment = "adventure";
          state.gameplayInput = "";
          c.lastPlayedAt = Date.now();
          renderScreens();
          return;
        }

        if (action === "view-summary") {
          state.summaryCampaignId = target.dataset.id;
          renderSummaryModal();
          return;
        }

        if (action === "close-summary") {
          state.summaryCampaignId = null;
          renderSummaryModal();
          return;
        }

        if (action === "codex-detail") {
          state.codexDetailId = target.dataset.id;
          renderCodexDetailModal();
          return;
        }

        if (action === "close-codex-detail") {
          state.codexDetailId = null;
          renderCodexDetailModal();
          return;
        }

        if (action === "open-add-codex") {
          if (!isUnlocked()) {
            toast("יש לפתוח קודם את מסך ההגדרות.");
            state.tab = "settings";
            renderScreens();
            return;
          }
          state.codexAddOpen = true;
          renderCodexAddModal();
          return;
        }

        if (action === "close-add-codex") {
          state.codexAddOpen = false;
          renderCodexAddModal();
          return;
        }

        if (action === "save-add-codex") {
          const d = state.addCodex;
          if (!d.title.trim() || !d.lore.trim()) {
            toast("יש להזין כותרת ורקע.");
            return;
          }
          state.codex.unshift({
            id: uid(),
            title: d.title.trim(),
            kind: d.kind,
            lore: d.lore.trim(),
            imagePrompt: `${d.kind} ${d.title} dark fantasy concept art`,
          });
          state.addCodex = { title: "", kind: "דמות", lore: "" };
          state.codexAddOpen = false;
          renderScreens();
          toast("כרטיס הסיפור נוסף.");
          return;
        }

        if (action === "save-api-key") {
          const input = document.getElementById("apiKeyInput");
          state.settings.apiKey = (input?.value || "").trim();
          renderSettings();
          renderLockOverlay();
          persist();
          toast(state.settings.apiKey ? "המפתח נשמר מקומית." : "שדה המפתח לא יכול להיות ריק.");
          return;
        }

        if (action === "clear-api-key") {
          state.settings.apiKey = "";
          renderSettings();
          renderLockOverlay();
          persist();
          toast("המפתח נמחק.");
          return;
        }

        if (action === "toggle-demo") {
          state.settings.demoMode = !state.settings.demoMode;
          renderSettings();
          renderLockOverlay();
          persist();
          toast(state.settings.demoMode ? "מצב דמו זמני הופעל." : "מצב דמו כובה.");
          return;
        }

        if (action === "use-demo-fast") {
          state.settings.demoMode = true;
          renderSettings();
          renderLockOverlay();
          persist();
          toast("מצב דמו הופעל לבדיקה מהירה.");
          return;
        }

        if (action === "toggle-free-images") {
          state.settings.freeImageMode = !state.settings.freeImageMode;
          renderScreens();
          toast(state.settings.freeImageMode ? "מצב תמונות חינמי הופעל." : "מצב תמונות חינמי כובה.");
          return;
        }

        if (action === "regenerate-images") {
          state.campaigns.forEach((c) => {
            c.imagePrompt = `${c.imagePrompt} ${Math.floor(Math.random() * 9999)}`;
          });
          state.codex.forEach((c) => {
            c.imagePrompt = `${c.imagePrompt} ${Math.floor(Math.random() * 9999)}`;
          });
          renderScreens();
          toast("זרעי התמונות רועננו.");
          return;
        }

        if (action === "close-gameplay") {
          state.activeCampaignId = null;
          state.loadingAI = false;
          renderGameplay();
          persist();
          return;
        }

        if (action === "set-gp-segment") {
          state.gameplaySegment = target.dataset.segment;
          renderGameplay();
          persist();
          return;
        }

        if (action === "send-action") {
          const input = document.getElementById("composerInput");
          if (!input) return;
          await sendUserAction(input.value);
          return;
        }

        if (action === "roll-d20") {
          const roll = Math.floor(Math.random() * 20) + 1;
          await sendUserAction(`Roll result (D20): ${roll}`);
          return;
        }

        if (action === "apply-engine") {
          toast("הגדרות המנוע הוחלו.");
          return;
        }

        if (action === "reset-engine") {
          resetEngine();
          renderGameplay();
          persist();
          toast("הגדרות המנוע אופסו.");
          return;
        }
      });

      document.addEventListener("input", (event) => {
        const bind = event.target.dataset.bind;
        if (!bind) return;
        if (bind === "apiKeyInput") return;

        if (bind === "gameplayInput") {
          state.gameplayInput = event.target.value;
          return;
        }

        if (bind.startsWith("setup.")) {
          const key = bind.split(".")[1];
          state.setup[key] = event.target.value;
          persist();
          return;
        }

        if (bind.startsWith("addCodex.")) {
          const key = bind.split(".")[1];
          state.addCodex[key] = event.target.value;
          persist();
          return;
        }
      });

      document.addEventListener("change", (event) => {
        const key = event.target.dataset.bindEngine;
        if (!key) return;
        state.engine[key] = Number(event.target.value);
        renderGameplay();
        persist();
      });

      document.addEventListener("keydown", async (event) => {
        if (event.key === "Escape") {
          if (state.setupOpen) state.setupOpen = false;
          if (state.summaryCampaignId) state.summaryCampaignId = null;
          if (state.codexDetailId) state.codexDetailId = null;
          if (state.codexAddOpen) state.codexAddOpen = false;
          if (state.activeCampaignId) state.activeCampaignId = null;
          renderScreens();
          return;
        }

        if (event.key === "Enter" && !event.shiftKey && event.target?.id === "composerInput") {
          event.preventDefault();
          await sendUserAction(event.target.value || "");
        }
      });

      function init() {
        preloadIconBank();
        initLogoDrag();
        renderScreens();
        setSplash();
      }

      init();
    </script>
  </body>
</html>
